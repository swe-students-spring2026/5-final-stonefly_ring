{% extends "base.html" %}
{% block title %}Pay {{ friend_username }}{% endblock %}
{% block content %}
<div class="page-header">
    <a href="/" class="back-button">← Back</a>
    <h1 class="page-title">Pay {{ friend_username }}</h1>
</div>

<section class="balance-summary">
    <p class="balance-label">You owe</p>
    <p class="balance-amount">${{ '%.2f'|format(amount|abs) }}</p>
</section>

<section class="form-section" style="padding: 16px;">
    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label class="form-label">Amount ($)</label>
            <input type="number" step="0.01" class="form-input" name="amount"
                value="{{ '%.2f'|format(amount|abs) }}" />
        </div>
        <div class="form-group">
            <label class="form-label">Note (optional)</label>
            <input type="text" class="form-input" name="note" placeholder="e.g. Venmo payment" />
        </div>
        <button type="submit" class="btn-primary">Record Payment</button>
    </form>
</section>
{% endblock %}
