{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><line x1="12" y1="6" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="18"/></svg>
    </div>
    <h1 class="auth-title">SplitRing</h1>
    <p class="auth-subtitle">Create your account</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <p class="auth-error">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}

    <form class="auth-form" method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email <span class="form-optional">(optional)</span></label>
            <input class="form-input" type="email" name="email" autocomplete="email">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" name="password" autocomplete="new-password" required>
        </div>
        <button class="btn-primary" type="submit">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
